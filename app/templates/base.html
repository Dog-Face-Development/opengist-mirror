<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "OpenGist Gist Mirror" }}</title>
    <style>
        :root {
            color-scheme: light dark;
            --border: #4a5568;
            --ok: #2f855a;
            --err: #c53030;
            --bg: #f7fafc;
            --card: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #1a202c;
        }
        main {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 16px 32px;
        }
        .card {
            background: var(--card);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 16px;
            padding: 16px;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .field {
            flex: 1 1 250px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        input[type="text"],
        input[type="password"],
        input[type="number"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            width: 100%;
            box-sizing: border-box;
        }
        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: #2b6cb0;
            color: white;
        }
        .btn-secondary {
            background: #4a5568;
            color: white;
        }
        .alert {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .ok {
            background: #c6f6d5;
            color: #1f4d2d;
            border: 1px solid #9ae6b4;
        }
        .err {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th,
        td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #edf2f7;
        }
        .status-success { color: var(--ok); font-weight: 600; }
        .status-error, .status-failed, .status-partial_failure { color: var(--err); font-weight: 600; }
        .muted { color: #4a5568; font-size: 13px; }
        h1, h2 { margin-top: 0; }
    </style>
</head>
<body>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
